services:
  mysql:
    image: mysql:8.0
    container_name: travel-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: travel_platform
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/ai_travel_platform_full.sql:/docker-entrypoint-initdb.d/ai_travel_platform_full.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4
      - --skip-name-resolve
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: travel-platform-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: ip
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9849:9849"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/ns/instance/list?serviceName=nacos || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  redis:
    image: redis:7.2-alpine
    container_name: travel-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: travel-platform-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: travel-platform-user
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travel_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: travel-platform-user
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      JWT_SECRET: travel-platform-jwt-secret-key-2025
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/api/user/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: travel-platform-ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: travel-platform-ai
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - "8082:8082"
    depends_on:
      nacos:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/api/ai/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  route-service:
    build:
      context: .
      dockerfile: route-service/Dockerfile
    container_name: travel-platform-route
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travel_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: travel-platform-route
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8083/api/route/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  attraction-service:
    build:
      context: .
      dockerfile: attraction-service/Dockerfile
    container_name: travel-platform-attraction
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travel_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: travel-platform-attraction
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8084/api/attraction/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  hotel-service:
    build:
      context: .
      dockerfile: hotel-service/Dockerfile
    container_name: travel-platform-hotel
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travel_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: travel-platform-hotel
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8085/api/hotel/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  favorite-service:
    build:
      context: .
      dockerfile: favorite-service/Dockerfile
    container_name: travel-platform-favorite
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travel_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: travel-platform-favorite
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: 123456
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8086/api/favorites/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: travel-platform-gateway
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ""
      SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR: nacos:8848
      JWT_SECRET: travel-platform-jwt-secret-key-2025
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web-frontend:
    build:
      context: .
      dockerfile: web-frontend/Dockerfile
    container_name: travel-platform-web
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3000:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  nacos_data:
  nacos_logs:
  redis_data:
  rabbitmq_data: