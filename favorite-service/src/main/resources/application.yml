server:
  port: 8086

spring:
  application:
    name: favorite-service
  datasource:
    url: jdbc:mysql://localhost:3309/travel_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
        ip: 127.0.0.1
      config:
        enabled: false

logging:
  level:
    com.example.favorite: DEBUG