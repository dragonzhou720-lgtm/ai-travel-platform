server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
        ip: 127.0.0.1
      config:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - JwtAuthenticationFilter
        - id: route-service
          uri: lb://route-service
          predicates:
            - Path=/api/route/**
          filters:
            - JwtAuthenticationFilter
        - id: attraction-service
          uri: lb://attraction-service
          predicates:
            - Path=/api/attraction/**
          filters:
            - JwtAuthenticationFilter
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotel/**
          filters:
            - JwtAuthenticationFilter
        - id: favorite-service
          uri: lb://favorite-service
          predicates:
            - Path=/api/favorite/**
          filters:
            - JwtAuthenticationFilter

jwt:
  secret: travel-platform-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256-algorithm