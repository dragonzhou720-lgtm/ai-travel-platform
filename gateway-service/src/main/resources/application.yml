server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        enabled: ${SPRING_CLOUD_NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR:localhost:8848}
        ip: ${SPRING_CLOUD_NACOS_DISCOVERY_IP:127.0.0.1}
      config:
        enabled: ${SPRING_CLOUD_NACOS_CONFIG_ENABLED:false}
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: route-service
          uri: lb://route-service
          predicates:
            - Path=/api/route/**
        - id: attraction-service
          uri: lb://attraction-service
          predicates:
            - Path=/api/attraction/**
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotel/**
        - id: favorite-service
          uri: lb://favorite-service
          predicates:
            - Path=/api/favorites/**

jwt:
  secret: ${JWT_SECRET:travel-platform-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256-algorithm}

management:
  endpoints:
    web:
      exposure:
        include: health,info